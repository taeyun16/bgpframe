name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Validate lockfile
        run: uv lock --check

      - name: Sync dev dependencies (without local package build)
        run: uv sync --locked --group dev --no-install-project

      - name: Build extension module
        run: uv run -- maturin develop

      - name: Rust unit tests
        run: cargo test --lib

      - name: Rust doc tests
        run: cargo test --doc

      - name: Python regression tests
        run: uv run python -m unittest -v tests.test_regression

      - name: Python doctest
        run: uv run python -m doctest -v src/bgpframe/polars_utils.py

      - name: Type checks
        run: uv run pyrefly check
